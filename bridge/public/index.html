<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      __BASE__ is replaced by the server with RENKU_BASE_URL_PATH (e.g. "/sessions/abc/").
      Renku proxies the session under that prefix WITHOUT stripping it, so a correct <base>
      is what makes every relative URL below (app.css, app.js, fetch("api/..."), the WS URL)
      resolve to the prefixed path. Do not change relative URLs to absolute ones.
    -->
    <base href="__BASE__" />
    <title>pi-bridge</title>
    <link rel="stylesheet" href="app.css" />
  </head>
  <body>
    <div id="app">
      <aside id="sidebar">
        <header class="sidebar-head">
          <h1>PI<span>BRIDGE</span></h1>
          <div class="sidebar-actions">
            <button id="btn-refresh" class="icon-btn" type="button" title="Refresh sessions">⟳</button>
            <button id="btn-new" class="icon-btn" type="button" title="New session">+</button>
          </div>
        </header>
        <div class="side-section">
          <div class="side-label">Sessions <span id="session-count" class="badge">0</span></div>
          <ul id="session-list" aria-label="Sessions"></ul>
        </div>
      </aside>

      <main id="main">
        <header id="topbar">
          <div id="session-title">No session selected</div>
          <div id="session-sub"></div>
          <div id="view-toggles">
            <button id="toggle-thinking" class="view-toggle" type="button" aria-pressed="true" title="Show/hide thinking">🧠 thinking</button>
            <button id="toggle-tools" class="view-toggle" type="button" aria-pressed="true" title="Show/hide tool usage">🔧 tools</button>
          </div>
        </header>

        <div id="transcript" aria-live="polite">
          <div class="empty">Select a session, or create a new one to start.</div>
        </div>

        <div id="composer-wrap">
          <div id="ac-menu" class="ac-menu" hidden></div>
          <div id="status-pill"><span class="dot"></span><span id="status-text">disconnected</span></div>
          <form id="composer" autocomplete="off">
            <div id="attachments" class="attachments" hidden></div>
            <textarea id="input" rows="2" placeholder="Select or create a session…" disabled></textarea>
            <div class="composer-bar">
              <span id="model-pill" class="pill-btn" title="Switch model">—</span>
              <span id="thinking-pill" class="pill-btn" title="Thinking level">thinking</span>
              <div class="composer-actions">
                <input id="file-input" type="file" accept="image/*" multiple hidden />
                <button id="btn-attach" class="icon-btn" type="button" title="Attach image">📎</button>
                <button id="btn-abort" class="icon-btn danger" type="button" title="Abort" hidden>■</button>
                <button id="btn-send" class="send-btn" type="submit" title="Send (Enter)" disabled>➤</button>
              </div>
            </div>
          </form>
          <div id="status-bar">
            <span id="stat-tokens"></span>
            <span id="stat-context"></span>
            <span id="stat-cost"></span>
          </div>
        </div>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
