# Renku 2.0 code-based build. We deliberately DON'T try to make the bridge a buildpack
# "frontend" — the build just produces a normal session image with our repo source in it
# (/workspace/source). The session's start command/args are overridden at the launcher /
# Amalthea level to run start.sh, which runs the bridge.
#
# Uses the SDSC selector builder (same one the opencode buildpack used). Frontend is
# whatever — jupyterlab — since we override the command anyway.

[_]
schema-version = "0.2"

[io.buildpacks]
builder = "ghcr.io/swissdatasciencecenter/renku-frontend-buildpacks/selector:0.4.0"

[[io.buildpacks.build.env]]
name = "BP_RENKU_FRONTENDS"
value = "jupyterlab"

[[io.buildpacks.build.env]]
name = "BP_RENKU_AI_AGENTS"
value = "coding-agent"

[[io.buildpacks.build.env]]
name = "BP_NODE_VERSION"
value = "~22"
